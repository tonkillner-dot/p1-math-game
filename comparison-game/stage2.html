<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="ด่าน 2: เปรียบเทียบว่ากลุ่มไหนมากกว่าหรือน้อยกว่า ด้วยการโยงเส้นจับคู่">
  <title>ด่าน 2: มากกว่า/น้อยกว่า | เปรียบเทียบจำนวน</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* ── Stage 2 Custom Styles ── */
    .match-area-wrap {
      position: relative;
      width: 100%;
      background: var(--bg-card);
      border: 3px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      touch-action: none;
    }
    .match-col-left  { align-items: flex-end; }
    .match-col-right { align-items: flex-start; }
    .match-item {
      font-size: clamp(22px, 8vw, 30px);
      min-height: 48px;
      width: 100%;
    }
    #svgLines {
      position: absolute;
      inset: 0; width: 100%; height: 100%;
      pointer-events: none;
      z-index: 15;
    }

    .phase-label {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(9px, 3vw, 12px);
      text-align: center;
      padding: 6px 12px;
      border-radius: 4px;
      margin-bottom: 8px;
    }
    .phase-match  { color: var(--accent4); background: #1a2a5e; border: 2px solid var(--accent4); }
    .phase-answer { color: var(--accent);  background: #3a2a0e; border: 2px solid var(--accent); }

    .leftover-highlight {
      animation: glowPulse 0.7s ease infinite alternate;
    }
    @keyframes glowPulse {
      from { box-shadow: 0 0 4px  var(--accent2); border-color: var(--accent2); }
      to   { box-shadow: 0 0 14px var(--accent2); border-color: #ff6b8a; }
    }

    .answer-3row {
      display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
      margin-top: 12px; width: 100%;
    }
    .answer-3row .btn-pixel {
      flex: 1; min-width: 90px; max-width: 160px;
      font-size: clamp(8px, 3vw, 12px);
      padding: 12px 8px;
    }

    .explain-box {
      background: #0d1a2e;
      border: 2px solid var(--accent4);
      border-radius: 6px;
      padding: 10px 12px;
      margin: 10px 0;
      text-align: center;
      font-size: 14px;
      line-height: 1.8;
      color: var(--text-main);
    }
    .explain-box .highlight-count {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(12px, 4vw, 16px);
      color: var(--accent);
    }
  </style>
</head>
<body>

<a href="index.html" class="back-btn" onclick="SFX.click()">◄ กลับ</a>
<div class="stars" id="stars"></div>

<div class="screen" id="mainScreen">

  <div style="height:36px"></div>

  <!-- Title -->
  <div class="game-title pixel-font" style="font-size:clamp(10px,3.5vw,14px); margin-bottom:4px;">
    ⚖️ ด่าน 2: เปรียบเทียบ!
  </div>
  <div class="game-subtitle pixel-font" style="font-size:clamp(7px,2.5vw,10px); margin-bottom:8px;">
    โยงเส้นจับคู่แล้วดูว่าใครมีมากกว่า
  </div>

  <!-- Progress -->
  <div class="pixel-panel" style="padding:10px 14px; margin-bottom:10px;">
    <div class="score-row">
      <span class="score-label">คะแนน: <span id="scoreDisplay">0</span></span>
      <span id="questionCounter" class="question-counter">ข้อ 1 / 5</span>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <!-- Phase Indicator -->
  <div id="phaseLabel" class="phase-label phase-match">
    ขั้นที่ 1: โยงเส้นจับคู่ 🔗
  </div>

  <!-- Instruction -->
  <div class="question-box" id="instructionBox">
    <div class="question-text" id="instruction">
      แตะสิ่งของด้านซ้าย แล้วแตะสิ่งของด้านขวาเพื่อจับคู่ 🖐️
    </div>
  </div>

  <!-- Match Area -->
  <div class="match-area-wrap" id="matchAreaWrap">
    <svg id="svgLines"></svg>
    <div class="match-area" id="matchArea">
      <div class="match-col match-col-left"  id="colLeft"></div>
      <div class="match-col match-col-right" id="colRight"></div>
    </div>
  </div>

  <!-- Explain area (hidden initially) -->
  <div id="explainArea" style="display:none; width:100%;"></div>

  <!-- Answer buttons (hidden initially) -->
  <div id="answerSection" style="display:none; width:100%;">
    <div class="question-box">
      <div class="question-text">🤔 ดูจากการจับคู่แล้ว...<br>กลุ่มไหนมีมากกว่า?</div>
    </div>
    <div class="answer-3row">
      <button class="btn-pixel blue"  id="btnLeft"  onclick="answer('left')">ซ้ายมากกว่า</button>
      <button class="btn-pixel green" id="btnEqual" onclick="answer('equal')">เท่ากัน</button>
      <button class="btn-pixel"       id="btnRight" onclick="answer('right')">ขวามากกว่า</button>
    </div>
  </div>

</div>

<!-- Credit -->
<div class="credit-footer">สร้างโดย ครูนภรัฐ</div>

<script src="game-common.js"></script>
<script>
/* ══════════════════════════════════════
   Stage 2: โยงเส้นจับคู่ + เปรียบเทียบ
   ══════════════════════════════════════ */

const TOTAL_Q = 5;
let currentQ  = 0;
let score     = 0;

// Matching state
let leftSel    = null;
let pairs      = [];
let leftCount  = 0;
let rightCount = 0;
let leftEmoji  = '';
let rightEmoji = '';
let matchingDone = false;
let answerPhase  = false;

const EMOJIS_POOL = [
  ['🍎','🍊','🍋','🍇','🍓','🫐','🍑'],
  ['⭐','🌙','☀️','🌈','❄️','💫','✨'],
  ['🐶','🐱','🐸','🐼','🐨','🐰','🐻'],
  ['🌸','🌺','🌻','🌷','🌹','🌼','💐'],
  ['🚗','✈️','🚢','🚂','🛵','🚌','🚀'],
  ['⚽','🏀','🎾','🏐','🎱','🏈','⚾'],
];

generateStars();

/* ── Build a question ── */
function buildQuestion() {
  matchingDone = false;
  answerPhase  = false;
  pairs  = [];
  leftSel = null;

  // Pick emoji set
  const set = EMOJIS_POOL[randInt(0, EMOJIS_POOL.length - 1)];
  leftEmoji  = set[randInt(0, set.length - 1)];
  do { rightEmoji = set[randInt(0, set.length - 1)]; } while (rightEmoji === leftEmoji);

  // Generate counts (ensure variety: equal, left-more, right-more)
  const type = randInt(0, 2); // 0=equal, 1=left more, 2=right more
  leftCount = randInt(2, 6);
  if (type === 0)      { rightCount = leftCount; }
  else if (type === 1) { rightCount = Math.max(1, leftCount - randInt(1, 2)); }
  else                 { rightCount = Math.min(8, leftCount + randInt(1, 2)); }

  // Reset UI
  document.getElementById('phaseLabel').className = 'phase-label phase-match';
  document.getElementById('phaseLabel').textContent = 'ขั้นที่ 1: โยงเส้นจับคู่ 🔗';
  document.getElementById('instruction').textContent = 'แตะสิ่งของด้านซ้าย แล้วแตะสิ่งของด้านขวาเพื่อจับคู่ 🖐️';
  document.getElementById('answerSection').style.display = 'none';
  document.getElementById('explainArea').style.display   = 'none';
  document.getElementById('explainArea').innerHTML       = '';

  // Render items
  const colLeft  = document.getElementById('colLeft');
  const colRight = document.getElementById('colRight');
  colLeft.innerHTML  = '';
  colRight.innerHTML = '';

  for (let i = 0; i < leftCount; i++) {
    const el = document.createElement('div');
    el.className   = 'match-item';
    el.dataset.idx = i;
    el.dataset.side = 'left';
    el.textContent = leftEmoji;
    el.addEventListener('click', () => tapItem('left', i, el));
    colLeft.appendChild(el);
  }
  for (let i = 0; i < rightCount; i++) {
    const el = document.createElement('div');
    el.className   = 'match-item';
    el.dataset.idx = i;
    el.dataset.side = 'right';
    el.textContent = rightEmoji;
    el.addEventListener('click', () => tapItem('right', i, el));
    colRight.appendChild(el);
  }

  clearLines();
  updateProgressBar(currentQ + 1, TOTAL_Q);
}

/* ── Tap to match ── */
function tapItem(side, idx, el) {
  if (matchingDone || answerPhase) return;
  if (el.classList.contains('matched')) return;
  SFX.select();

  if (side === 'left') {
    // Select left item
    document.querySelectorAll('.match-item.selected').forEach(e => e.classList.remove('selected'));
    leftSel = idx;
    el.classList.add('selected');
  } else {
    // Right tapped — need a left selected
    if (leftSel === null) return;
    if (pairs.find(p => p.right === idx)) return;
    if (pairs.find(p => p.left === leftSel)) return;

    pairs.push({ left: leftSel, right: idx });
    SFX.match();

    // Mark matched
    const leftEl  = document.querySelector(`#colLeft  .match-item[data-idx="${leftSel}"]`);
    const rightEl = document.querySelector(`#colRight .match-item[data-idx="${idx}"]`);
    leftEl.classList.remove('selected');
    leftEl.classList.add('matched');
    rightEl.classList.add('matched');

    leftSel = null;
    drawLines();
    checkIfAllPaired();
  }
}

/* ── Draw SVG lines ── */
function drawLines() {
  const svg  = document.getElementById('svgLines');
  const wrap = document.getElementById('matchAreaWrap');
  const rect = wrap.getBoundingClientRect();
  svg.innerHTML = '';

  pairs.forEach((p, i) => {
    const leftEl  = document.querySelector(`#colLeft  .match-item[data-idx="${p.left}"]`);
    const rightEl = document.querySelector(`#colRight .match-item[data-idx="${p.right}"]`);
    if (!leftEl || !rightEl) return;

    const lr = leftEl.getBoundingClientRect();
    const rr = rightEl.getBoundingClientRect();

    const x1 = lr.right - rect.left;
    const y1 = lr.top   - rect.top + lr.height / 2;
    const x2 = rr.left  - rect.left;
    const y2 = rr.top   - rect.top + rr.height / 2;

    const colors = ['#f7c948','#3ddc84','#5b8dd9','#e94560','#cc44ff','#ff9500'];
    const color  = colors[i % colors.length];

    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1', x1); line.setAttribute('y1', y1);
    line.setAttribute('x2', x2); line.setAttribute('y2', y2);
    line.setAttribute('stroke', color);
    line.setAttribute('stroke-width', '4');
    line.setAttribute('stroke-dasharray', '8 4');
    svg.appendChild(line);
  });
}

function clearLines() {
  document.getElementById('svgLines').innerHTML = '';
}

/* ── Check if maximum pairs reached ── */
function checkIfAllPaired() {
  const maxPairs = Math.min(leftCount, rightCount);
  if (pairs.length >= maxPairs) {
    matchingDone = true;
    setTimeout(showComparePhase, 500);
  }
}

/* ── Transition to compare phase ── */
function showComparePhase() {
  answerPhase = true;

  // Change phase label
  const phaseEl = document.getElementById('phaseLabel');
  phaseEl.className = 'phase-label phase-answer';
  phaseEl.textContent = 'ขั้นที่ 2: เปรียบเทียบ! ⚖️';

  // Highlight leftover items
  const allLeft  = document.querySelectorAll('#colLeft  .match-item');
  const allRight = document.querySelectorAll('#colRight .match-item');
  let leftoverLeft  = 0;
  let leftoverRight = 0;

  allLeft.forEach(el => {
    if (!el.classList.contains('matched')) {
      el.classList.add('leftover-highlight');
      leftoverLeft++;
    }
  });
  allRight.forEach(el => {
    if (!el.classList.contains('matched')) {
      el.classList.add('leftover-highlight');
      leftoverRight++;
    }
  });

  // Show explanation
  const explainArea = document.getElementById('explainArea');
  explainArea.style.display = '';
  if (leftCount === rightCount) {
    explainArea.innerHTML = `
      <div class="explain-box">
        ✅ จับคู่ได้หมดทุกตัว!<br>
        ซ้าย <span class="highlight-count">${leftCount}</span> ตัว
        &nbsp;•&nbsp;
        ขวา <span class="highlight-count">${rightCount}</span> ตัว<br>
        ไม่มีตัวเหลือเลย 🎯
      </div>`;
  } else if (leftCount > rightCount) {
    explainArea.innerHTML = `
      <div class="explain-box">
        👀 ด้านซ้ายมีตัวเหลือ!<br>
        ซ้าย <span class="highlight-count">${leftCount}</span> ตัว
        &nbsp;•&nbsp;
        ขวา <span class="highlight-count">${rightCount}</span> ตัว<br>
        มี <span style="color:var(--accent2); font-weight:bold">${leftoverLeft} ตัว</span> ที่จับคู่ไม่ได้
      </div>`;
  } else {
    explainArea.innerHTML = `
      <div class="explain-box">
        👀 ด้านขวามีตัวเหลือ!<br>
        ซ้าย <span class="highlight-count">${leftCount}</span> ตัว
        &nbsp;•&nbsp;
        ขวา <span class="highlight-count">${rightCount}</span> ตัว<br>
        มี <span style="color:var(--accent2); font-weight:bold">${leftoverRight} ตัว</span> ที่จับคู่ไม่ได้
      </div>`;
  }

  // Update instruction
  document.getElementById('instruction').textContent =
    'ดูสิ่งของที่เหลือ แล้วตอบว่ากลุ่มไหนมากกว่า?';

  // Show answer buttons
  document.getElementById('answerSection').style.display = '';

  // Enable buttons
  ['btnLeft','btnEqual','btnRight'].forEach(id => {
    const b = document.getElementById(id);
    b.disabled = false;
    b.style.opacity = '1';
  });
}

/* ── Answer ── */
function answer(choice) {
  if (!answerPhase) return;
  SFX.click();

  let correct;
  let correctText;
  if (leftCount > rightCount) {
    correct = (choice === 'left');
    correctText = `ซ้ายมากกว่า! (${leftCount} มากกว่า ${rightCount})`;
  } else if (rightCount > leftCount) {
    correct = (choice === 'right');
    correctText = `ขวามากกว่า! (${rightCount} มากกว่า ${leftCount})`;
  } else {
    correct = (choice === 'equal');
    correctText = `เท่ากัน! (${leftCount} เท่ากับ ${rightCount})`;
  }

  // Disable buttons
  ['btnLeft','btnEqual','btnRight'].forEach(id => {
    document.getElementById(id).disabled = true;
    document.getElementById(id).style.opacity = '0.5';
  });

  if (correct) { score++; SFX.correct(); }
  else         { SFX.wrong(); }

  showFeedback(correct,
    `ถูกต้อง! 🌟<br><span style="font-size:11px">${correctText}</span>`,
    `ลองอีกครั้ง! 💪<br><span style="font-size:11px">${correctText}</span>`,
    nextQuestion
  );
}

/* ── Next question ── */
function nextQuestion() {
  currentQ++;
  document.getElementById('scoreDisplay').textContent = score;

  if (currentQ >= TOTAL_Q) {
    showResult(2, score, TOTAL_Q);
  } else {
    buildQuestion();
  }
}

/* ── Init ── */
buildQuestion();
</script>
</body>
</html>
